<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
</head>

<body>
  <header>Battleship</header>
  <div id="loadScreen">
    <button id="single">Single Player</button>
    <button id="double">Two Player</button>
    <button id="clear">Clear Game</button>
  </div>
  <div id="activePlayer"></div>
  <div id="game">
    <div class="fullboard" id="p1">
      <div class="shipYard">   
        <form action="">Ship 5<br>
          <label for="xCoord">x-coordinate: </label><br>
          <input type="number" id="xCoord" name="xCoord"><br>
          <label for="yCoord">y-coordinate: </label><br>
          <input type="number" id="yCoord" name="yCoord"><br>
          <label for="orientation">Orientation: </label>
          <select name="orientation" id="orientation">
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
          </select>
          <button id="ship5" type="submit">Place ship!</button>
        </form>
        <form action="">Ship 4</form>
        <form action="">Ship 3v1</form>
        <form action="">Ship 3v2</form>
        <form action="">Ship 2</form>
      </div>
      <div class="board" id="playerOne"></div>
    </div>
    <div class="fullboard" id="p2">
      <div class="shipYard"></div>
      <div class="board" id="playerTwo"></div>
    </div>
  </div>
  </body>

</html>
