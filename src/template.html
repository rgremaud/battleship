<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
</head>

<body>
  <header>Battleship</header>
  <div id="loadScreen">
    <button id="single">Single Player</button>
    <button id="double">Two Player</button>
    <button id="clear">Clear Game</button>
  </div>
  <div id="activePlayer"></div>
  <div id="game">
    <div class="fullboard" id="p1">
      <div class="shipYard">   
        <button id="ship5">Ship 5</button>
        <button id="ship4">Ship 4</button>
        <button id="ship3v1">Ship 3v1</button>
        <button id="ship3v2">Ship 3v2</button>
        <button id="ship2">Ship 2</button>
      </div>
      <div class="board" id="playerOne"></div>
    </div>
    <div class="fullboard" id="p2">
      <div class="shipYard"></div>
      <div class="board" id="playerTwo"></div>
    </div>
  </div>
  </body>

</html>
