<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>

  <body>
    <header>Battleship</header>
    <div id="loadScreen">
      <button id="single">Single Player</button>
      <button id="double">Two Player</button>
      <button id="clear">Clear Game</button>
    </div>
    <div id="console">Welcome! Please select your game type.</div>
    <button id="stage">Hide your ships!</button>
    <div id="game">
      <div class="fullBoard" id="p1">
        <div class="shipYard">
          <div class="allShips">
            <div class="playerOneship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerOneship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerOneship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerOneship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerOneship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
          </div>
          <div class="buttonNav">
            <button id="playerOneHorizontal">Horizontal</button>
            <button id="playerOneVertical">Vertical</button>
          </div>
        </div>
        <div class="board" id="playerOne"></div>
      </div>
      <div class="fullBoard" id="p2">
        <div class="shipYard">
          <div class="allShips">
            <div class="playerTwoship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerTwoship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerTwoship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerTwoship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
            <div class="playerTwoship">
              <div class="shipBox"></div>
              <div class="shipBox"></div>
            </div>
          </div>
          <div class="buttonNav">
            <button id="playerTwoHorizontal">Horizontal</button>
            <button id="playerTwoVertical">Vertical</button>
          </div>
        </div>
        <div class="board" id="playerTwo"></div>
      </div>
    </div>
  </body>
</html>
